<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal ePBPPP SKPK Miri</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Smooth scrolling and basic resets */
        html { scroll-behavior: smooth; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen bg-[#f8fafc] relative font-sans overflow-y-auto selection:bg-blue-200">

    <!-- Background Styling -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <!-- Subtle dot pattern -->
        <div class="absolute inset-0 bg-[radial-gradient(#cbd5e1_1px,transparent_1px)] [background-size:24px_24px] opacity-40"></div>
        <!-- Top gradient (Deep blue to transparent) -->
        <div class="absolute top-0 left-0 right-0 h-[60vh] bg-gradient-to-b from-[#253f7c] via-[#4a6bbd]/80 to-transparent"></div>
    </div>

    <div class="relative z-10 max-w-6xl mx-auto px-4 pt-16 pb-24">
        
        <!-- Header Section -->
        <div class="flex flex-col items-center text-center mb-12">
            <!-- Logo -->
            <div class="w-28 h-28 bg-white rounded-full shadow-lg mb-6 flex items-center justify-center border-4 border-white/20 overflow-hidden p-1">
                <img 
                    src="logo.jpeg.jpeg" 
                    alt="Logo SKPK Miri" 
                    class="w-full h-full object-contain rounded-full"
                    onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';"
                />
                <!-- Fallback if image not found -->
                <div id="logo-fallback" class="hidden w-full h-full rounded-full bg-slate-50 items-center justify-center border border-slate-100">
                    <i data-lucide="graduation-cap" class="text-[#253f7c] w-10 h-10"></i>
                </div>
            </div>
            
            <h1 class="text-3xl md:text-4xl font-bold text-white tracking-tight drop-shadow-md mb-2">
                Portal ePBPPP SK Pendidikan Khas Miri
            </h1>
            
            <p class="text-xl md:text-2xl font-medium text-white/90 italic drop-shadow-sm mb-6">
                "Agar Dapat Turut Berbakti"
            </p>
            
            <!-- Date & Time Badge -->
            <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-md border border-white/20 text-white px-5 py-2.5 rounded-full text-sm font-medium shadow-sm">
                <i data-lucide="clock" class="w-4 h-4 opacity-80"></i>
                <span id="clock-display">Memuatkan masa...</span>
            </div>
        </div>

        <!-- Menu Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 items-start">
            
            <!-- MENU 1: Fail Pengurusan PBPPP -->
            <div id="card-1" class="w-full flex flex-col rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 border border-white/20 bg-gradient-to-br from-blue-500 to-indigo-600 hover:-translate-y-1">
                <button onclick="toggleMenu(1)" class="w-full min-h-[150px] group p-5 flex items-center gap-5 focus:outline-none rounded-2xl text-left">
                    <div class="w-14 h-14 shrink-0 rounded-xl flex items-center justify-center bg-white/20 text-white group-hover:scale-110 transition-transform duration-300 shadow-inner backdrop-blur-sm">
                        <i data-lucide="folder-open" class="w-6 h-6 stroke-2"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-lg font-bold text-white group-hover:text-white/90 transition-colors drop-shadow-sm">Fail Pengurusan PBPPP</h3>
                        <p class="text-sm text-white/90 mt-1 leading-snug font-medium">Akses folder dokumen pengurusan jawatankuasa dan fail induk PBPPP.</p>
                    </div>
                    <div class="text-white/80 shrink-0 group-hover:text-white transition-colors">
                        <i id="chevron-1" data-lucide="chevron-right" class="w-5 h-5 transform transition-transform duration-300"></i>
                    </div>
                </button>
                <!-- Dropdown -->
                <div id="menu-1" class="overflow-hidden transition-all duration-500 ease-in-out max-h-0 opacity-0">
                    <div class="px-3 pb-3">
                        <div class="glass-panel rounded-xl shadow-inner p-2">
                            <ul class="space-y-1" id="list-1">
                                <!-- JS will populate this to keep HTML clean -->
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- MENU 2: Penilaian Kendiri -->
            <div class="w-full flex flex-col rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 border border-white/20 bg-gradient-to-br from-violet-500 to-purple-600 hover:-translate-y-1">
                <button onclick="window.open('https://drive.google.com/drive/folders/14MvpoKPc50JiJlYIEEHfso9XCU2_Xpne?usp=sharing', '_blank')" class="w-full min-h-[150px] group p-5 flex items-center gap-5 focus:outline-none rounded-2xl text-left">
                    <div class="w-14 h-14 shrink-0 rounded-xl flex items-center justify-center bg-white/20 text-white group-hover:scale-110 transition-transform duration-300 shadow-inner backdrop-blur-sm">
                        <i data-lucide="user-check" class="w-6 h-6 stroke-2"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-lg font-bold text-white group-hover:text-white/90 transition-colors drop-shadow-sm">Penilaian Kendiri</h3>
                        <p class="text-sm text-white/90 mt-1 leading-snug font-medium">Borang dan panduan untuk Pegawai Yang Dinilai (PYD) melengkapkan penilaian kendiri.</p>
                    </div>
                    <div class="text-white/80 shrink-0 group-hover:text-white transition-colors">
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                    </div>
                </button>
            </div>

            <!-- MENU 3: Pegawai Penilai -->
            <div id="card-3" class="w-full flex flex-col rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 border border-white/20 bg-gradient-to-br from-emerald-500 to-teal-600 hover:-translate-y-1">
                <button onclick="toggleMenu(3)" class="w-full min-h-[150px] group p-5 flex items-center gap-5 focus:outline-none rounded-2xl text-left">
                    <div class="w-14 h-14 shrink-0 rounded-xl flex items-center justify-center bg-white/20 text-white group-hover:scale-110 transition-transform duration-300 shadow-inner backdrop-blur-sm">
                        <i data-lucide="briefcase" class="w-6 h-6 stroke-2"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-lg font-bold text-white group-hover:text-white/90 transition-colors drop-shadow-sm">Pegawai Penilai</h3>
                        <p class="text-sm text-white/90 mt-1 leading-snug font-medium">Ruangan khusus untuk Pegawai Penilai (PP) menyemak dan melaksanakan penilaian.</p>
                    </div>
                    <div class="text-white/80 shrink-0 group-hover:text-white transition-colors">
                        <i id="chevron-3" data-lucide="chevron-right" class="w-5 h-5 transform transition-transform duration-300"></i>
                    </div>
                </button>
                <!-- Dropdown -->
                <div id="menu-3" class="overflow-hidden transition-all duration-500 ease-in-out max-h-0 opacity-0">
                    <div class="px-3 pb-3">
                        <div class="glass-panel rounded-xl shadow-inner p-2">
                            <ul class="space-y-1" id="list-3">
                                <!-- JS will populate this -->
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- MENU 4: Senarai PP dan PYD -->
            <div class="w-full flex flex-col rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 border border-white/20 bg-gradient-to-br from-amber-500 to-orange-500 hover:-translate-y-1">
                <button onclick="window.open('https://drive.google.com/file/d/1b8mG1XuN38mt6VeyUrA_4hGTbRqRbizz/view?usp=sharing', '_blank')" class="w-full min-h-[150px] group p-5 flex items-center gap-5 focus:outline-none rounded-2xl text-left">
                    <div class="w-14 h-14 shrink-0 rounded-xl flex items-center justify-center bg-white/20 text-white group-hover:scale-110 transition-transform duration-300 shadow-inner backdrop-blur-sm">
                        <i data-lucide="users" class="w-6 h-6 stroke-2"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-lg font-bold text-white group-hover:text-white/90 transition-colors drop-shadow-sm">Senarai PP dan PYD</h3>
                        <p class="text-sm text-white/90 mt-1 leading-snug font-medium">Senarai rasmi pemadanan Pegawai Penilai dan Pegawai Yang Dinilai tahun semasa.</p>
                    </div>
                    <div class="text-white/80 shrink-0 group-hover:text-white transition-colors">
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                    </div>
                </button>
            </div>

            <!-- MENU 5: Dokumen Rujukan -->
            <div class="w-full flex flex-col rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 border border-white/20 bg-gradient-to-br from-rose-500 to-red-600 hover:-translate-y-1">
                <button onclick="window.open('https://drive.google.com/drive/folders/1HRshi_1PCwutlv3Qp94AgxiyCKn2cVFj?usp=sharing', '_blank')" class="w-full min-h-[150px] group p-5 flex items-center gap-5 focus:outline-none rounded-2xl text-left">
                    <div class="w-14 h-14 shrink-0 rounded-xl flex items-center justify-center bg-white/20 text-white group-hover:scale-110 transition-transform duration-300 shadow-inner backdrop-blur-sm">
                        <i data-lucide="file-text" class="w-6 h-6 stroke-2"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-lg font-bold text-white group-hover:text-white/90 transition-colors drop-shadow-sm">Dokumen Rujukan</h3>
                        <p class="text-sm text-white/90 mt-1 leading-snug font-medium">Kompilasi manual pengguna, instrumen penilaian, dan garis panduan rasmi KPM.</p>
                    </div>
                    <div class="text-white/80 shrink-0 group-hover:text-white transition-colors">
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                    </div>
                </button>
            </div>

            <!-- MENU 6: Sistem ePrestasi -->
            <div class="w-full flex flex-col rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 border border-white/20 bg-gradient-to-br from-cyan-500 to-blue-500 hover:-translate-y-1">
                <button onclick="window.open('https://eprestasi.moe.gov.my/', '_blank')" class="w-full min-h-[150px] group p-5 flex items-center gap-5 focus:outline-none rounded-2xl text-left">
                    <div class="w-14 h-14 shrink-0 rounded-xl flex items-center justify-center bg-white/20 text-white group-hover:scale-110 transition-transform duration-300 shadow-inner backdrop-blur-sm">
                        <i data-lucide="globe" class="w-6 h-6 stroke-2"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-lg font-bold text-white group-hover:text-white/90 transition-colors drop-shadow-sm">Sistem ePrestasi</h3>
                        <p class="text-sm text-white/90 mt-1 leading-snug font-medium">Pautan pantas log masuk ke portal rasmi ePrestasi Kementerian Pendidikan Malaysia.</p>
                    </div>
                    <div class="text-white/80 shrink-0 group-hover:text-white transition-colors">
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                    </div>
                </button>
            </div>

        </div>

        <!-- Footer -->
        <div class="mt-16 text-center text-slate-400 text-sm">
            <p id="copyright-year">© 2024 SKPK Miri. Hak Cipta Terpelihara.</p>
        </div>

    </div>

    <!-- Script Logic -->
    <script>
        // 1. Initialize Icons
        lucide.createIcons();

        // 2. Clock Logic
        function updateClock() {
            const date = new Date();
            const days = ['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'];
            const months = ['Januari', 'Februari', 'Mac', 'April', 'Mei', 'Jun', 'Julai', 'Ogos', 'September', 'Oktober', 'November', 'Disember'];

            const dayName = days[date.getDay()];
            const day = date.getDate();
            const monthName = months[date.getMonth()];
            const year = date.getFullYear();

            let hours = date.getHours();
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const seconds = date.getSeconds().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PTG' : 'PG';

            hours = hours % 12;
            hours = hours ? hours : 12; 
            const strTime = `${hours.toString().padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;

            document.getElementById('clock-display').innerText = `${dayName}, ${day} ${monthName} ${year} | ${strTime}`;
            document.getElementById('copyright-year').innerText = `© ${year} SKPK Miri. Hak Cipta Terpelihara.`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 3. Dropdown Data & Logic
        const menu1Items = [
            { title: '1. Fail Pengurusan PBPPP (Fail Terperingkat)', link: '#' },
            { title: '2. Surat Arahan Pelaksanaan PBPPP', link: 'https://drive.google.com/file/d/11-uEEi3PDU77XJjCbGuNS5FwS4I4E-Lf/view?usp=sharing' },
            { title: '3. Senarai nama Jawatankuasa PBPPP organisasi', link: 'https://drive.google.com/file/d/1SobLcXEujlyo9EKZCwZ1jRIKvwNNAGGw/view?usp=sharing' },
            { title: '4. Surat Panggilan dan minit Mesyuarat Jawatankuasa', link: 'https://drive.google.com/file/d/1O4d3oxuiZULWjuw3z61L1E_d5urOUwFL/view?usp=sharing' },
            { title: '5. Rekod pemakluman pelaksanaan PBPPP', link: 'https://drive.google.com/file/d/1Bc7QCHUOMYXAqVzEJk9lnmN5mpE4vIHq/view?usp=sharing' },
            { title: '6. Borang Pemantauan PBPPP (jika ada)', link: '#' },
            { title: '7. Senarai PYD dan PP yang dicetak dari e-Prestasi', link: 'https://drive.google.com/file/d/1b8mG1XuN38mt6VeyUrA_4hGTbRqRbizz/view?usp=sharing' },
            { title: '8. Rekod PP menyerahkan salinan Borang Skor kepada PYD', link: '#' },
            { title: '9. Rekod PP menyerahkan salinan Borang Keberhasilan', link: '#' },
            { title: '10. Salinan jadual/perancangan penjajaran masa penilaian', link: '#' },
            { title: '11. Bukti PP dibekalkan instrumen/panduan PBPPP dll.', link: 'https://drive.google.com/file/d/1VOJdwU8nDVNaOFvg0JW3CLrKd6rZSbZF/view?usp=sharing' },
            { title: '12. Surat panggilan & minit mesyuarat pelarasan markah', link: 'https://drive.google.com/file/d/10BZz2pVE9fsTgFxeZcyseRChwdqO8y98/view?usp=sharing' }
        ];

        const menu3Items = [
            { title: 'Aziz bin Tahir', link: '#' },
            { title: 'Mohamad Abidin bin Sipek', link: '#' },
            { title: 'Ling Mee Choo', link: '#' },
            { title: 'Salihin bin Ahmad', link: '#' },
            { title: 'Nur Hidayu binti Yusop', link: '#' }
        ];

        function populateList(listId, items, iconName, hoverColorClass, iconHoverColorClass) {
            const listEl = document.getElementById(listId);
            items.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <a href="${item.link}" target="${item.link !== '#' ? '_blank' : '_self'}" class="w-full block px-4 py-3 rounded-lg bg-transparent hover:bg-slate-100 text-slate-700 hover:${hoverColorClass} text-sm font-semibold transition-colors flex items-start justify-between group/item">
                        <div class="flex items-start gap-3 pr-4">
                            <i data-lucide="${iconName}" class="w-4 h-4 text-slate-400 group-hover/item:${iconHoverColorClass} transition-colors shrink-0 mt-0.5"></i>
                            <span class="leading-snug">${item.title}</span>
                        </div>
                        <i data-lucide="external-link" class="w-4 h-4 text-slate-300 opacity-0 group-hover/item:opacity-100 transition-opacity shrink-0 mt-0.5"></i>
                    </a>
                `;
                listEl.appendChild(li);
            });
        }

        populateList('list-1', menu1Items, 'file-text', 'text-blue-700', 'text-blue-500');
        populateList('list-3', menu3Items, 'user', 'text-teal-700', 'text-teal-500');
        lucide.createIcons(); // Re-initialize icons for dynamic content

        // Toggle Logic for Accordion
        let activeMenu = null;

        function toggleMenu(menuId) {
            const menus = [1, 3]; // IDs of cards that have dropdowns
            
            menus.forEach(id => {
                const menuEl = document.getElementById(`menu-${id}`);
                const cardEl = document.getElementById(`card-${id}`);
                const chevronEl = document.getElementById(`chevron-${id}`);
                
                if (id === menuId && activeMenu !== menuId) {
                    // Open this menu
                    menuEl.classList.remove('max-h-0', 'opacity-0');
                    menuEl.classList.add('max-h-[1200px]', 'opacity-100');
                    cardEl.classList.add('ring-4', 'ring-white/30', 'scale-[1.02]', 'z-10');
                    cardEl.classList.remove('hover:-translate-y-1');
                    chevronEl.classList.add('rotate-90');
                } else {
                    // Close other menus (or toggle off active menu)
                    menuEl.classList.remove('max-h-[1200px]', 'opacity-100');
                    menuEl.classList.add('max-h-0', 'opacity-0');
                    cardEl.classList.remove('ring-4', 'ring-white/30', 'scale-[1.02]', 'z-10');
                    cardEl.classList.add('hover:-translate-y-1');
                    chevronEl.classList.remove('rotate-90');
                }
            });
            
            // Update active menu state
            activeMenu = activeMenu === menuId ? null : menuId;
        }
    </script>
</body>
</html>
